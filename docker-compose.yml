services:
  app:
    build: .
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    depends_on:
      - redis
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  sidekiq:
    build: .
    command: bundle exec sidekiq -r ./config/sidekiq_boot.rb
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    working_dir: /app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RAILS_ENV=development
    depends_on:
      - redis

volumes:
  bundle_cache:
  redis_data:
