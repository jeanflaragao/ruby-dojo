services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # This keeps the container alive in the background for development
    command: tail -f /dev/null && bundle exec rackup --host 0.0.0.0 -p 4567
    ports:
      - "4567:4567"
    volumes:
      - .:/app
      # This named volume caches your gems.
      # Remember: If you change Gemfile, run `docker compose run --rm app bundle install`
      - bundle_cache:/usr/local/bundle
    stdin_open: true
    tty: true
    environment:
      - RUBYOPT=-EUTF-8
      - BUNDLE_PATH=/usr/local/bundle

volumes:
  bundle_cache:
